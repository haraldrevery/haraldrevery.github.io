<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/main.css">
    <title>Harald Revery - Event Card</title>

    <link rel="preload" href="/fonts/HaraldReveryTextFont.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/HaraldReveryMonoFont.woff2" as="font" type="font/woff2" crossorigin>

    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               style-src 'self' 'unsafe-inline';
               font-src 'self' data:;
               img-src 'self' data: blob:;
               media-src 'self';
               script-src 'self' 'unsafe-inline';">

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="shortcut icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <style>
        /* ── Page shell ─────────────────────────────────────── */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* Stub: hidden element so event_card.js doesn't throw
           when it looks up #clock-date to attach its click listener */
        #clock-date { display: none; }

        /* ── ECM — page-level layout (was overlay + modal) ─── */
        .ecm-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 1;
            /* No backdrop, no opacity transition — always visible */
        }

        /* The modal now fills the whole viewport */
        .ecm-modal {
            background: rgba(10, 10, 10, 0.97);
            border: none;
            border-radius: 0;
            width: 100%;
            height: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--font-mono);
            color: rgba(255, 255, 255, 0.88);
            box-shadow: none;
            transform: none !important;   /* kill the slide-in animation */
            transition: none !important;
        }

        /* ── ECM header ──────────────────────────────────────── */
        .ecm-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
        }
        .ecm-header-title {
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            opacity: 0.4;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }
        .ecm-close-btn {
            background: none;
            border: none;
            color: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0.35;
            padding: 0.3rem 0.6rem;
            font-family: var(--font-mono);
            letter-spacing: 0.06em;
            border-radius: 0.2rem;
            transition: opacity 0.2s, background 0.2s;
            text-decoration: none;
        }
        .ecm-close-btn:hover { opacity: 1; background: rgba(255,255,255,0.06); }

        /* ── ECM body / columns ──────────────────────────────── */
        .ecm-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            overflow: hidden;
            flex: 1;
            min-height: 0;
        }
        @media (max-width: 680px) {
            .ecm-body {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
        }

        .ecm-col-form {
            padding: 1.3rem 1.4rem;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }
        .ecm-col-form::-webkit-scrollbar { width: 3px; }
        .ecm-col-form::-webkit-scrollbar-track { background: transparent; }
        .ecm-col-form::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

        .ecm-col-preview {
            padding: 1.3rem 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            overflow: hidden;
        }

        /* ── ECM form elements ───────────────────────────────── */
        .ecm-label {
            display: block;
            font-size: 0.58rem;
            letter-spacing: 0.2em;
            opacity: 0.38;
            margin-bottom: 0.45rem;
            text-transform: uppercase;
        }

        .ecm-input, .ecm-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            color: rgba(255, 255, 255, 0.88);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            padding: 0.55rem 0.75rem;
            border-radius: 0.3rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
            resize: vertical;
        }
        .ecm-input:focus, .ecm-textarea:focus {
            border-color: rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.06);
        }
        .ecm-textarea { min-height: 88px; }

        /* ── Calendar ────────────────────────────────────────── */
        .ecm-cal {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 0.35rem;
            padding: 0.7rem 0.75rem;
            user-select: none;
        }
        .ecm-cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.65rem;
        }
        .ecm-cal-nav-btn {
            background: none;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.4;
            padding: 0.15rem 0.45rem;
            border-radius: 0.2rem;
            transition: opacity 0.2s, background 0.2s;
            line-height: 1;
        }
        .ecm-cal-nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.07); }
        .ecm-cal-month-label {
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            opacity: 0.75;
        }
        .ecm-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            text-align: center;
        }
        .ecm-cal-dow {
            font-size: 0.54rem;
            letter-spacing: 0.08em;
            opacity: 0.28;
            padding: 0.15rem 0;
            text-transform: uppercase;
        }
        .ecm-cal-day {
            font-size: 0.68rem;
            padding: 0.28rem 0.1rem;
            cursor: pointer;
            border-radius: 0.18rem;
            transition: background 0.15s;
            opacity: 0.72;
            border: 1px solid transparent;
        }
        .ecm-cal-day:hover { background: rgba(255,255,255,0.09); opacity: 1; }
        .ecm-cal-day.ecm-today { border-color: rgba(255,255,255,0.22); opacity: 1; }
        .ecm-cal-day.ecm-selected {
            background: rgba(255,255,255,0.18);
            opacity: 1;
            border-color: rgba(255,255,255,0.35);
        }
        .ecm-cal-day.ecm-other { opacity: 0.18; cursor: default; pointer-events: none; }

        /* ── Toggle rows / buttons ───────────────────────────── */
        .ecm-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .ecm-toggle-row {
            display: flex;
            gap: 0.35rem;
        }
        .ecm-toggle-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.6);
            font-family: inherit;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.42rem 0.5rem;
            cursor: pointer;
            border-radius: 0.22rem;
            transition: all 0.2s;
            text-align: center;
        }
        .ecm-toggle-btn.active {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.28);
            color: rgba(255,255,255,0.9);
        }
        .ecm-toggle-btn:hover:not(.active) {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.8);
        }

        /* ── Color inputs & sliders ──────────────────────────── */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            height: 1.8rem;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 0.22rem; }

        .ecm-slider {
            width: 100%;
            cursor: pointer;
            accent-color: rgba(255,255,255,0.7);
        }

        /* ── Format buttons ──────────────────────────────────── */
        .ecm-formats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        .ecm-fmt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.55);
            font-family: inherit;
            font-size: 0.6rem;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 0.32rem 0.65rem;
            cursor: pointer;
            border-radius: 0.22rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .ecm-fmt-btn.active {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.28);
            color: rgba(255,255,255,0.9);
        }
        .ecm-fmt-btn:hover:not(.active) {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.8);
        }

        /* ── Preview pane ────────────────────────────────────── */
        .ecm-preview-wrap {
            flex: 1;
            min-height: 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.35rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0.65rem;
        }
        .ecm-preview-wrap canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
            border-radius: 2px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.6);
        }

        /* ── Export button ───────────────────────────────────── */
        .ecm-export-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.85);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-radius: 0.3rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .ecm-export-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.38);
            color: #fff;
        }
        .ecm-export-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <!--
        Stub elements that event_card.js queries at startup.
        They must exist in the DOM before the script runs.
        #clock-date  — the script attaches a click listener to open the overlay;
                       on this page the overlay is always open so the listener
                       is harmless but must not be null.
        #ecm-overlay — the script reads/writes .active on this; we add the class
                       immediately so the generator is visible from the start.
    -->
    <div id="clock-date" style="display:none;" aria-hidden="true"></div>

    <!-- Always-visible card generator (was an overlay modal on the clock page) -->
    <div class="ecm-overlay active" id="ecm-overlay">
        <div class="ecm-modal">
            <div class="ecm-header">
                <span class="ecm-header-title">Create Event Card</span>
                <!-- Back to clock — JS below overrides the close handler -->
                <a href="/time.html" class="ecm-close-btn" id="ecm-close">← back to clock</a>
            </div>
            <div class="ecm-body">
                <div class="ecm-col-form">

                    <div>
                        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.45rem;">
                            <label class="ecm-label" style="margin-bottom:0;">Title</label>
                            <div class="ecm-toggle-row" id="ecm-show-title-row" style="width: 100px;">
                                <button class="ecm-toggle-btn active" style="padding:0.2rem;" data-show-title="true">On</button>
                                <button class="ecm-toggle-btn" style="padding:0.2rem;" data-show-title="false">Off</button>
                            </div>
                        </div>
                        <input class="ecm-input" id="ecm-title" type="text" placeholder="Event name..." maxlength="80">
                    </div>

                    <div>
                        <label class="ecm-label">Author / Contact</label>
                        <input class="ecm-input" id="ecm-author" type="text" placeholder="Name or email..." maxlength="80">
                    </div>

                    <div>
                        <label class="ecm-label">Description — markdown supported</label>
                        <textarea class="ecm-textarea" id="ecm-desc" rows="5"
                            placeholder="# Heading&#10;**bold**, *italic*, `code`&#10;- list item"></textarea>
                    </div>

                    <div>
                        <label class="ecm-label">Date</label>
                        <div class="ecm-cal" id="ecm-cal"></div>
                    </div>

                    <div class="ecm-row-2">
                        <div>
                            <label class="ecm-label">Card Theme</label>
                            <div class="ecm-toggle-row" id="ecm-theme-row">
                                <button class="ecm-toggle-btn active" data-theme="dark">Dark</button>
                                <button class="ecm-toggle-btn" data-theme="light">Light</button>
                            </div>
                        </div>

                        <div>
                            <label class="ecm-label">Language / Date</label>
                            <div class="ecm-toggle-row" id="ecm-lang-row">
                                <button class="ecm-toggle-btn active" data-lang="en">EN</button>
                                <button class="ecm-toggle-btn" data-lang="sv">SV</button>
                                <button class="ecm-toggle-btn" data-lang="off">OFF</button>
                            </div>
                        </div>
                    </div>

                    <div class="ecm-row-2" style="margin-top: 1.1rem;">
                        <div>
                            <label class="ecm-label">Align Header</label>
                            <div class="ecm-toggle-row" id="ecm-align-row">
                                <button class="ecm-toggle-btn active" data-align="left">Left</button>
                                <button class="ecm-toggle-btn" data-align="center">Center</button>
                                <button class="ecm-toggle-btn" data-align="right">Right</button>
                            </div>
                        </div>
                        <div>
                            <label class="ecm-label">Author Pos.</label>
                            <div class="ecm-toggle-row" id="ecm-author-pos-row">
                                <button class="ecm-toggle-btn active" data-author-pos="opposite">Opposite</button>
                                <button class="ecm-toggle-btn" data-author-pos="diagonal">Diagonal</button>
                            </div>
                        </div>
                    </div>

                    <div class="ecm-row-2">
                        <div>
                            <label class="ecm-label">Texture</label>
                            <div class="ecm-toggle-row" id="ecm-texture-row">
                                <button class="ecm-toggle-btn active" data-texture="false">Off</button>
                                <button class="ecm-toggle-btn" data-texture="true">On</button>
                            </div>
                        </div>
                        <div>
                            <label class="ecm-label">Justify Text</label>
                            <div class="ecm-toggle-row" id="ecm-justify-row">
                                <button class="ecm-toggle-btn" data-justify="false">Off</button>
                                <button class="ecm-toggle-btn active" data-justify="true">On</button>
                            </div>
                        </div>
                    </div>

                    <div class="ecm-row-2">
                        <div>
                            <label class="ecm-label">Background Graphic</label>
                            <div class="ecm-toggle-row" id="ecm-graphic-row">
                                <button class="ecm-toggle-btn active" data-graphic="ring">Ring</button>
                                <button class="ecm-toggle-btn" data-graphic="logo">Logo</button>
                                <button class="ecm-toggle-btn" data-graphic="none">Off</button>
                            </div>
                        </div>
                        <div>
                            <label class="ecm-label">Columns</label>
                            <div class="ecm-toggle-row" id="ecm-columns-row">
                                <button class="ecm-toggle-btn active" data-columns="1">1</button>
                                <button class="ecm-toggle-btn" data-columns="2">2</button>
                                <button class="ecm-toggle-btn" data-columns="3">3</button>
                            </div>
                        </div>
                    </div>

                    <div class="ecm-row-2">
                        <div>
                            <label class="ecm-label">Title Color</label>
                            <input type="color" id="ecm-color-title" value="#ffffff" style="width:100%; cursor:pointer; background:transparent;">
                        </div>
                        <div>
                            <label class="ecm-label">Date Color</label>
                            <input type="color" id="ecm-color-date" value="#a1a1a1" style="width:100%; cursor:pointer; background:transparent;">
                        </div>
                    </div>

                    <div class="ecm-row-2">
                        <div>
                            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.2rem;">
                                <label class="ecm-label" style="margin-bottom:0;">Font Scale</label>
                                <span id="ecm-font-scale-val" style="font-size:0.6rem; opacity:0.6;">1.00x</span>
                            </div>
                            <input type="range" class="ecm-slider" id="ecm-font-scale" min="0.9" max="8.0" step="0.05" value="1.5">
                        </div>
                        <div>
                            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.2rem;">
                                <label class="ecm-label" style="margin-bottom:0;">Edge Padding</label>
                                <span id="ecm-pad-scale-val" style="font-size:0.6rem; opacity:0.6;">1.00x</span>
                            </div>
                            <input type="range" class="ecm-slider" id="ecm-pad-scale" min="0.5" max="5.0" step="0.05" value="1.0">
                        </div>
                    </div>
                    <div class="ecm-row-2" style="margin-top: 0.5rem;">
                        <div style="grid-column: 2;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.2rem;">
                                <label class="ecm-label" style="margin-bottom:0;" title="Adjust horizontal vs vertical padding">Pad Bias (Y↔X)</label>
                                <span id="ecm-pad-ratio-val" style="font-size:0.6rem; opacity:0.6;">0.00</span>
                            </div>
                            <input type="range" class="ecm-slider" id="ecm-pad-ratio" min="-0.8" max="0.8" step="0.05" value="0">
                        </div>
                    </div>

                    <div>
                        <label class="ecm-label">Export Format</label>
                        <div class="ecm-formats" id="ecm-formats"></div>
                    </div>

                </div>

                <div class="ecm-col-preview">
                    <label class="ecm-label">Preview</label>
                    <div class="ecm-preview-wrap" id="ecm-preview-wrap">
                        <canvas id="ecm-canvas"></canvas>
                    </div>

                    <div style="margin-top: auto;">
                        <label class="ecm-label">File Type</label>
                        <div class="ecm-toggle-row" id="ecm-filetype-row" style="margin-bottom: 0.8rem; flex-wrap: wrap;">
                            <button class="ecm-toggle-btn active" data-file-type="jpg">JPG</button>
                            <button class="ecm-toggle-btn" data-file-type="png">PNG</button>
                            <button class="ecm-toggle-btn" data-file-type="pdf">PDF</button>
                            <button class="ecm-toggle-btn" data-file-type="png_transp">PNG Transp.</button>
                            <button class="ecm-toggle-btn" data-file-type="pdf_transp">PDF Transp.</button>
                        </div>
                    </div>

                    <button class="ecm-export-btn" id="ecm-export-btn">↓ &nbsp; Export Card</button>
                </div>

            </div>
        </div>
    </div>

    <script src="/javascript/jspdf.umd.min.js"></script>
    <script src="/javascript/event_card.js" defer></script>

    <script>
        /*
         * Override the close-button behaviour injected by event_card_min.js.
         *
         * event_card.js does:
         *   closeBtn.addEventListener('click', () => overlay.classList.remove('active'))
         *   overlay.addEventListener('click', e => { if (e.target===overlay) overlay.classList.remove('active') })
         *
         * On this standalone page the overlay IS the page, so removing 'active'
         * would blank the screen.  We swap those listeners out after the script
         * has finished setting up, and replace them with a navigation action.
         *
         * We also trigger an initial redraw because the overlay starts as
         * 'active' — on the clock page the first redraw happened inside the
         * click handler that opened the modal.
         */
        window.addEventListener('load', function () {
            var overlay  = document.getElementById('ecm-overlay');
            var closeBtn = document.getElementById('ecm-close');

            /* Replace the overlay click-outside handler with a no-op so
               accidentally clicking the container doesn't blank the page. */
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) e.stopImmediatePropagation();
            }, true); /* capture phase — runs before the handler in event_card_min.js */

            /* The close button is already an <a href="/time.html"> so the
               browser navigates naturally.  Remove any JS listeners the
               card script may have attached that would preventDefault. */
            var freshBtn = closeBtn.cloneNode(true);
            closeBtn.parentNode.replaceChild(freshBtn, closeBtn);
        });
    </script>
</body>
</html>
